plugins {
	id 'java'
	id 'org.springframework.boot' version '3.1.5'
	id 'io.spring.dependency-management' version '1.1.3'
}

group = 'com.fairbourn'
version = '0.0.1-SNAPSHOT'
sourceCompatibility = '17'

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-web'
	implementation 'org.springframework.boot:spring-boot-starter-thymeleaf'
	implementation 'org.springframework.boot:spring-boot-starter-jdbc'
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'

	// SQLite driver (compatible with Spring Boot 3.x / Hibernate 6)
	implementation 'org.xerial:sqlite-jdbc:3.45.1.0'
	// Community dialects - version MUST match the Hibernate version pulled in by Spring Boot 3.1.5
	// Spring Boot 3.1.5 uses Hibernate 6.2.13.Final
	implementation 'org.hibernate.orm:hibernate-community-dialects:6.2.13.Final'

	testImplementation group: 'junit', name: 'junit', version: '4.12'
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testImplementation group: 'org.mockito', name: 'mockito-core', version: '3.3.3'

	developmentOnly("org.springframework.boot:spring-boot-devtools")
}

tasks.named('test') {
	useJUnitPlatform()
}