<div class="container">
    <div class="row">
        <div class="input-group m-3">
            <input type="text" class="form-control" id="search" placeholder="Search by title..."
                   [(ngModel)]="searchTerm" (ngModelChange)="onSearchChange()">
        </div>
    </div>
    <div class="row">
        <div class="col-2">
            <app-filters [recipeCriteria]="recipeCriteria" (updateFiltersEvent)="applyFilters($event)"></app-filters>
        </div>
        <div class="col-10">
            <div id="recipesId">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th scope="col" class="col-4 sortable-header" (click)="sortBy('title')">
                                Recipe
                                <i class="fas {{ getSortIcon('title') }} sort-icon"
                                   [class.sort-icon--active]="sortColumn === 'title'"></i>
                            </th>
                            <th scope="col" class="col-2 sortable-header" (click)="sortBy('rating')">
                                Rating
                                <i class="fas {{ getSortIcon('rating') }} sort-icon"
                                   [class.sort-icon--active]="sortColumn === 'rating'"></i>
                            </th>
                            <th scope="col" class="col-2">Nationality</th>
                            <th scope="col" class="col-4">Tags</th>
                        </tr>
                    </thead>
                    <tbody>
                        <ng-container *ngFor="let recipe of pagedRecipes">
                            <tr [routerLink]="[recipe.recipeId]" class="cursor-pointer">
                                <td>{{ recipe.title }}</td>
                                <td>
                                    <ng-container *ngFor="let star of [].constructor(5); let i = index">
                                        <i class="fa-star" 
                                        [class.fas]="i < recipe.rating" 
                                        [class.far]="i >= recipe.rating">
                                        </i>
                                    </ng-container>
                                </td>
                                <td>{{ recipe.nationality }}</td>
                                <td>{{ recipe.tags.join(', ') }}</td>
                            </tr>
                        </ng-container>
                    </tbody>
                </table>

                <nav *ngIf="totalPages > 1">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" [class.disabled]="currentPage === 1">
                            <a class="page-link" (click)="goToPage(currentPage - 1)">Previous</a>
                        </li>
                        <li class="page-item" *ngFor="let page of pages" [class.active]="page === currentPage">
                            <a class="page-link" (click)="goToPage(page)">{{ page }}</a>
                        </li>
                        <li class="page-item" [class.disabled]="currentPage === totalPages">
                            <a class="page-link" (click)="goToPage(currentPage + 1)">Next</a>
                        </li>
                    </ul>
                </nav>

            </div>
        </div>
    </div>
</div>
